name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://user:$HF_TOKEN@huggingface.co/spaces/keepingLLMontrack/llm-annotation-platform hf-space

          # --exclude 'hf-space' prevents copying the clone into itself (which
          # previously caused unbounded hf-space/hf-space/... nesting).
          # --delete keeps the Space a true mirror so removed files don't linger.
          rsync -av --delete --exclude '.git' --exclude 'hf-space' --exclude '.venv' ./ hf-space/

          cd hf-space

          git add .

          git commit -m "Sync from GitHub" || echo "No changes to commit"

          git push
