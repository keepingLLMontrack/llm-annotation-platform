name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://user:$HF_TOKEN@huggingface.co/spaces/keepingLLMontrack/llm-annotation-platform _space_sync

          # Clone into a uniquely-named folder so the exclude only protects the
          # clone itself (not any real path). With --delete, files on the Space
          # that are NOT in this repo (e.g. stale hf-space/ nesting) get removed,
          # keeping the Space a clean mirror of the repo.
          rsync -av --delete --exclude '.git' --exclude '_space_sync' --exclude '.venv' ./ _space_sync/

          cd _space_sync

          git add -A

          git commit -m "Sync from GitHub" || echo "No changes to commit"

          git push
